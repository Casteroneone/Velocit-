<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocità - Admin Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montagu+Slab:opsz,wght@16..144,100..700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="style_admin.css">
</head>
<body>
    <div class="bg-glow"></div>

    <header class="admin-header">
        <a href="../Homepage/index.html" class="logo">Velocità</a>
        <div class="header-right">
            <a href="#" class="nav-link">Fleets Management</a>
            <div class="profile-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Tinna M.</span>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container">
            
            <!-- Left Column: Profile Card -->
            <div class="profile-card-wrapper">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h2 class="profile-name">Tinna M.</h2>
                    <p class="profile-email">tinna.mon@student.mahidol.edu</p>
                    <p class="profile-id">ID: 6788063 <span class="copy-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(41, 30, 13, 0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </span></p>
                </div>
                
                <div class="profile-actions">
                    <button class="action-btn btn-delete">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        Delete
                    </button>
                    <button class="action-btn btn-logout" onclick="window.location.href='../Homepage/index.html'">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Logout
                    </button>
                </div>
            </div>

            <!-- Right Column: Info Card -->
            <div class="info-card">
                <div class="info-header">
                    <h2>Admin Information</h2>
                    <a href="../Admin_edit/admin_edit.html" class="edit-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </a>
                </div>
                <div class="divider"></div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <label>First Name <span class="required">*</span></label>
                        <p>Tinna</p>
                    </div>
                    <div class="info-item">
                        <label>Last Name <span class="required">*</span></label>
                        <p>Mongkolsaomoke</p>
                    </div>
                    <div class="info-item">
                        <label>Role <span class="required">*</span></label>
                        <p>Product Manager</p>
                    </div>
                    <div class="info-item">
                        <label>Date of Birth <span class="required">*</span></label>
                        <p>01/01/01</p>
                    </div>
                    <div class="info-item full-width">
                        <label>Address <span class="required">*</span></label>
                        <p>4 Privet Drive, Little Whinging, Surrey, England</p>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
