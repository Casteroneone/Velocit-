<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocità - Fleets Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Niconne&family=Montagu+Slab:opsz,wght@16..144,100..700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="style_fleets.css">
</head>

<body>
    <!-- ADMIN HEADER -->
    <header class="admin-header">
        <a href="../Homepage/index.html" class="logo">Velocità</a>
        <nav class="admin-nav">
            <a href="fleets.html" class="admin-nav-link active">Fleets Management</a>
            <a href="../Adminpage/admin.html" class="profile-badge">
                <span class="badge-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <span id="nav-admin-name">Admin</span>
            </a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="fleets-main">
        <h1 class="page-title">Fleets Management</h1>

        <!-- ===== FILTER + ACTION BAR ===== -->
        <div class="toolbar">
            <div class="filters">
                <!-- Car Brand filter -->
                <div class="filter-group">
                    <span class="filter-label-text">Car Brand</span>
                    <div class="filter-dropdown">
                        <select id="filter-brand">
                            <option value="">All Brand</option>
                            <option value="Aston Martin">Aston Martin</option>
                            <option value="BMW">BMW</option>
                            <option value="Ferrari">Ferrari</option>
                            <option value="Lamborghini">Lamborghini</option>
                            <option value="Maserati">Maserati</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="Porsche">Porsche</option>
                            <option value="Tesla">Tesla</option>
                        </select>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>

                <!-- Status filter -->
                <div class="filter-group">
                    <span class="filter-label-text">Status</span>
                    <div class="filter-dropdown">
                        <select id="filter-status">
                            <option value="">All Status</option>
                            <option value="Available">Available</option>
                            <option value="Rented">Rented</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>

                <!-- License Plate search -->
                <div class="filter-group">
                    <span class="filter-label-text">License Plate</span>
                    <div class="filter-search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="filter-plate" placeholder="All License Plate">
                    </div>
                </div>
            </div>

            <div class="action-btns">
                <button class="btn-add" id="btn-add">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add
                </button>
                <button class="btn-delete-sel" id="btn-delete-selected" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Delete
                </button>
            </div>
        </div>

        <!-- ===== TABLE ===== -->
        <div class="table-wrapper">
            <table class="fleets-table">
                <thead>
                    <tr>
                        <th class="col-check"><input type="checkbox" id="check-all"></th>
                        <th>Image</th>    
                        <th>Vehicle ID</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Daily Price</th>
                        <th>License Plate</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>

        <!-- Showing X of Y -->
        <p class="table-count" id="table-count">Showing 0 of 0</p>
    </main>

    <!-- ===================================================
         MODAL: DELETE CONFIRMATION
    =================================================== -->
    <div class="modal-overlay" id="modal-delete" style="display:none;">
        <div class="modal-box">
            <p class="modal-question">Are you sure<br>you want to delete this vehicle?</p>
            <div class="modal-actions">
                <button class="modal-btn-delete" id="confirm-delete">Delete</button>
                <button class="modal-btn-cancel" id="cancel-delete">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ===================================================
         MODAL: ADD / EDIT VEHICLE
    =================================================== -->
    <div class="modal-overlay" id="modal-form" style="display:none;">
        <div class="form-modal">
            <h2 class="form-title" id="form-title">Add Vehicle</h2>

            <div class="form-body">

                <!-- LEFT: image + title + details -->
                <div class="form-img-col">
                    <div class="img-upload-box" id="img-upload-box" onclick="document.getElementById('img-file-input').click()">
                        <img id="form-img-preview" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:8px;">
                        <div class="img-placeholder" id="img-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#7a5a30" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span>Click to add vehicle photo</span>
                        </div>
                        <input type="file" id="img-file-input" accept="image/*" style="display:none;">
                    </div>

                    <div class="form-group">
                        <label>Title <span class="req">*</span></label>
                        <input type="text" id="f-title" placeholder="">
                    </div>

                    <div class="form-group">
                        <label>Details <span class="req">*</span></label>
                        <textarea id="f-details" placeholder=""></textarea>
                    </div>
                </div>

                <!-- RIGHT: all other fields -->
                <div class="form-fields-col">

                    <div class="form-group">
                        <label>Car Brand <span class="req">*</span></label>
                        <div class="select-wrap">
                            <select id="f-brand">
                                <option value=""></option>
                                <option>Aston Martin</option>
                                <option>BMW</option>
                                <option>Ferrari</option>
                                <option>Lamborghini</option>
                                <option>Maserati</option>
                                <option>Mercedes-Benz</option>
                                <option>Porsche</option>
                                <option>Tesla</option>
                            </select>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Car Model <span class="req">*</span></label>
                        <input type="text" id="f-model" placeholder="">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Transmission <span class="req">*</span></label>
                            <div class="toggle-group" id="f-transmission">
                                <button type="button" class="toggle-btn" data-val="Auto">Auto</button>
                                <button type="button" class="toggle-btn" data-val="Manual">Manual</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Seats <span class="req">*</span></label>
                            <div class="toggle-group" id="f-seats">
                                <button type="button" class="toggle-btn" data-val="2">2</button>
                                <button type="button" class="toggle-btn" data-val="4">4</button>
                                <button type="button" class="toggle-btn" data-val="6">6</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Doors <span class="req">*</span></label>
                            <div class="toggle-group" id="f-doors">
                                <button type="button" class="toggle-btn" data-val="2">2</button>
                                <button type="button" class="toggle-btn" data-val="4">4</button>
                                <button type="button" class="toggle-btn" data-val="5">5</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Year <span class="req">*</span></label>
                            <input type="number" id="f-year" placeholder="" min="1990" max="2030">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Daily Price <span class="req">*</span></label>
                            <input type="number" id="f-price" placeholder="">
                        </div>
                        <div class="form-group">
                            <label>License Plate <span class="req">*</span></label>
                            <input type="text" id="f-plate" placeholder="">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Status <span class="req">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <span class="status-dot dot-available"></span>
                                <input type="radio" name="f-status" value="Available"> Available
                            </label>
                            <label class="radio-label">
                                <span class="status-dot dot-rented"></span>
                                <input type="radio" name="f-status" value="Rented"> Rented
                            </label>
                            <label class="radio-label">
                                <span class="status-dot dot-maintenance"></span>
                                <input type="radio" name="f-status" value="Maintenance"> Maintenance
                            </label>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Footer buttons -->
            <div class="form-footer">
                <button class="form-btn-cancel" id="form-cancel">Cancel</button>
                <button class="form-btn-save" id="form-save">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="../nav.js"></script>
    <script>
        // Show logged-in admin name in nav badge
        const admin = JSON.parse(sessionStorage.getItem('admin') || 'null');
        if (admin) {
            const el = document.getElementById('nav-admin-name');
            if (el) el.textContent = `${admin.first_name} ${admin.last_name.charAt(0)}.`;
        }
    </script>
    <script src="fleets.js"></script>
</body>

</html>
