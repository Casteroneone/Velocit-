<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocità - Admin Information</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Niconne&family=Montagu+Slab:opsz,wght@16..144,100..700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="style_admin.css">
</head>
<body>
    <div class="bg-glow"></div>

    <header class="admin-header">
        <a href="../Homepage/index.html" class="logo">Velocità</a>
        <nav class="admin-nav">
            <a href="../Fleets/fleets.html" class="admin-nav-link">Fleets Management</a>
            <a href="../Adminpage/admin.html" class="profile-badge">
                <span class="badge-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <span id="nav-admin-name">Admin</span>
            </a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="admin-main">
        <div class="admin-container">
            
            <!-- Left Column: Profile Card -->
            <div class="profile-card-wrapper">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h2 class="profile-name" id="profile-name">—</h2>
                    <p class="profile-email" id="profile-email">—</p>
                    <p class="profile-id" id="profile-id">ID: — <span class="copy-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(41, 30, 13, 0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </span></p>
                </div>
                
                <div class="profile-actions">
                    <button class="action-btn btn-delete">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        Delete
                    </button>
                    <button class="action-btn btn-logout">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Logout
                    </button>
                </div>
            </div>

            <!-- Right Column: Info Card -->
            <div class="info-card">
                <div class="info-header">
                    <h2>Admin Information</h2>
                    <a href="../Admin_edit/admin_edit.html" class="edit-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </a>
                </div>
                <div class="divider"></div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <label>First Name <span class="required">*</span></label>
                        <p id="info-first-name">—</p>
                    </div>
                    <div class="info-item">
                        <label>Last Name <span class="required">*</span></label>
                        <p id="info-last-name">—</p>
                    </div>
                    <div class="info-item">
                        <label>Role <span class="required">*</span></label>
                        <p id="info-role">—</p>
                    </div>
                    <div class="info-item">
                        <label>Date of Birth <span class="required">*</span></label>
                        <p id="info-dob">—</p>
                    </div>
                    <div class="info-item full-width">
                        <label>Address <span class="required">*</span></label>
                        <p id="info-address">—</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div class="footer-logo">Velocità</div>
        <div class="footer-info">
            <h4>CONTACT INFO</h4>
            <p>Phone: 1212312121</p>
            <p>Email: velocita@email.com</p>
            <p>Location: 111 Soi Sukhumvit 55 (Thonglor Road), Bangkok Thonglor, Bangkok</p>
        </div>
    </footer>

    <script src="../nav.js"></script>
    <script>
        const API_BASE = 'http://localhost:3030';

        // ── Load admin data ───────────────────────────────────────
        async function loadAdmin() {
            const stored = localStorage.getItem('admin');
            const admin = stored ? JSON.parse(stored) : null;

            if (!admin) {
                window.location.href = '../Loginpage/login.html';
                return;
            }

            // ── Populate profile card ──────────────────────────────
            const fullName = `${admin.first_name} ${admin.last_name.charAt(0)}.`;
            document.getElementById('profile-name').textContent  = fullName;
            document.getElementById('profile-email').textContent = admin.email || '—';
            document.getElementById('profile-id').innerHTML =
                `ID: ${admin.admin_id} <span class="copy-icon" title="Copy ID" style="cursor:pointer;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(41,30,13,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </span>`;

            // ── Copy ID to clipboard ──────────────────────────────
            document.querySelector('.copy-icon').addEventListener('click', () => {
                navigator.clipboard.writeText(String(admin.admin_id)).then(() => {
                    const icon = document.querySelector('.copy-icon svg');
                    icon.style.stroke = '#3a9a3a';
                    setTimeout(() => { icon.style.stroke = 'rgba(41,30,13,0.75)'; }, 1500);
                });
            });

            // ── Populate nav badge ────────────────────────────────
            document.getElementById('nav-admin-name').textContent = fullName;

            // ── Populate info grid ────────────────────────────────
            document.getElementById('info-first-name').textContent = admin.first_name || '—';
            document.getElementById('info-last-name').textContent  = admin.last_name  || '—';
            document.getElementById('info-role').textContent       = admin.role        || '—';
            document.getElementById('info-address').textContent    = admin.address     || '—';

            if (admin.date_of_birth) {
                const d = new Date(admin.date_of_birth);
                document.getElementById('info-dob').textContent =
                    d.toLocaleDateString('en-GB');   // DD/MM/YYYY
            }
        }

        // ── Delete account ────────────────────────────────────────
        document.querySelector('.btn-delete').addEventListener('click', async () => {
            if (!confirm('Are you sure you want to delete this admin account?')) return;
            const stored = JSON.parse(localStorage.getItem('admin') || 'null');
            if (!stored) return;
            try {
                const res = await fetch(`${API_BASE}/api/admin/${stored.admin_id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error();
                localStorage.removeItem('admin');
                window.location.href = '../Loginpage/login.html';
            } catch {
                alert('Failed to delete account. Please try again.');
            }
        });

        // ── Logout ────────────────────────────────────────────────
        document.querySelector('.btn-logout').addEventListener('click', () => {
            localStorage.removeItem('admin');
            window.location.href = '../Loginpage/login.html';
        });

        loadAdmin();
    </script>
</body>
</html>
